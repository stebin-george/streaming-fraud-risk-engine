name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m pip install -e .
    - name: Run tests
      run: pytest -q

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Build images
      run: |
        docker build -f docker/Dockerfile.api -t fraud/api:ci .
        docker build -f docker/Dockerfile.train -t fraud/train:ci .
        docker build -f docker/Dockerfile.generator -t fraud/generator:ci .
        docker build -f docker/Dockerfile.stream -t fraud/stream:ci .
